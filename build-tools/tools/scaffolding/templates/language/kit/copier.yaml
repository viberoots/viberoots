_subdirectory: "."
_templates_suffix: ".jinja"
_answers_file: ".copier-answers.yml"

lang_id:
  type: str
  help: New language id (e.g., rust)

display_name:
  type: str
  help: Display name (e.g., Rust)
  default: "{{ lang_id | capitalize }}"

_tasks:
  - mkdir -p build-tools/tools/tests/{{ lang_id }}/contract
