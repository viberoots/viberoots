version: 1

_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"
  keep_trailing_newline: true

_exclude:
  - meta.json

name: ""
language: "deployment"
template: "vercel-next"
component: ""
team: ""
project: ""
environment: "preview"
stage: "dev"
shared_package: "{{ name }}-shared"
canonical_url: "https://{{ name }}.example.invalid"
