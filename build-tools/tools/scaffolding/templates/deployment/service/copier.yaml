version: 1

_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"
  keep_trailing_newline: true

_exclude:
  - meta.json

name: ""
language: "deployment"
template: "service"
component: ""
cluster: ""
namespace: "{{ name }}"
release: "{{ name }}"
stage: "dev"
service_kind: "web"
shared_package: "{{ name }}-shared"
health_path: "/healthz"

_tasks:
  - mkdir -p helm
