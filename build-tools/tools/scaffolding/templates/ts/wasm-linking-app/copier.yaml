version: 1

_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"
  keep_trailing_newline: true

_exclude:
  - meta.json

name: ""
language: "ts"
template: "wasm-linking-app"
pkgScope: "@apps"
importer: "projects/apps/{{ name }}"
lockfilePath: "projects/apps/{{ name }}/pnpm-lock.yaml"

_tasks:
  - mkdir -p libs/{{ name }}-support/include
  - mkdir -p libs/{{ name }}-support/src
  - mkdir -p libs/{{ name }}-support/patches/cpp
  - mkdir -p libs/{{ name }}-core/src
  - mkdir -p libs/{{ name }}-core/patches/cpp
  - mkdir -p libs/{{ name }}-api
  - mkdir -p libs/{{ name }}-api/patches/go
  - mkdir -p libs/{{ name }}-cpp-wasm/src
  - mkdir -p libs/{{ name }}-py-wasm/native
  - mkdir -p libs/{{ name }}-py-wasm/src/pyext
  - mkdir -p libs/{{ name }}-wasm-inline
  - mkdir -p apps/{{ name }}/src
  - mkdir -p apps/{{ name }}/public
  - mkdir -p apps/{{ name }}-cli/src

_templates_suffix: ".jinja"
_answers_file: ".copier-answers.yml"
