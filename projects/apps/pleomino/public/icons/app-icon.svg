<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Pleomino</title>
  <desc id="desc">Pleomino app icon with evenly padded interlocking puzzle pieces</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#1f3b63"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <g transform="translate(60 60)">
    <g fill="#a855f7">
      <rect x="196" y="0" width="98" height="98"/>
      <rect x="294" y="0" width="98" height="98"/>
      <rect x="294" y="98" width="98" height="98"/>
    </g>

    <g fill="#3b82f6">
      <rect x="0" y="98" width="98" height="98"/>
      <rect x="98" y="98" width="98" height="98"/>
      <rect x="196" y="98" width="98" height="98"/>
      <rect x="0" y="196" width="98" height="98"/>
    </g>

    <g fill="#22c55e">
      <rect x="98" y="196" width="98" height="98"/>
      <rect x="196" y="196" width="98" height="98"/>
      <rect x="98" y="294" width="98" height="98"/>
      <rect x="196" y="294" width="98" height="98"/>
    </g>

    <g fill="#f7fbff">
      <rect x="294" y="196" width="98" height="98"/>
      <rect x="294" y="294" width="98" height="98"/>
    </g>
  </g>
</svg>
