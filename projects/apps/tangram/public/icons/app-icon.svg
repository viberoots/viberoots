<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Tangram</title>
  <desc id="desc">Tangram app icon composed only of the puzzle piece shapes used in the game</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#1f3b63"/>
    </linearGradient>
    <style>
      .c { rx: 8; ry: 8; }
    </style>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <g transform="translate(64 74)">
    <!-- purple-2-1 -->
    <g transform="translate(0 0)" fill="#a855f7">
      <rect class="c" x="0" y="0" width="52" height="52"/>
      <rect class="c" x="52" y="0" width="52" height="52"/>
      <rect class="c" x="0" y="52" width="52" height="52"/>
    </g>

    <!-- red-2-2 -->
    <g transform="translate(134 4)" fill="#ef4444">
      <rect class="c" x="0" y="0" width="50" height="50"/>
      <rect class="c" x="0" y="50" width="50" height="50"/>
      <rect class="c" x="50" y="50" width="50" height="50"/>
      <rect class="c" x="50" y="100" width="50" height="50"/>
    </g>

    <!-- green-2-2 -->
    <g transform="translate(248 10)" fill="#22c55e">
      <rect class="c" x="0" y="0" width="48" height="48"/>
      <rect class="c" x="48" y="0" width="48" height="48"/>
      <rect class="c" x="0" y="48" width="48" height="48"/>
      <rect class="c" x="48" y="48" width="48" height="48"/>
    </g>

    <!-- black-1-1-1-1 -->
    <g transform="translate(18 196)" fill="#101820">
      <rect class="c" x="0" y="0" width="46" height="46"/>
      <rect class="c" x="46" y="0" width="46" height="46"/>
      <rect class="c" x="92" y="0" width="46" height="46"/>
      <rect class="c" x="138" y="0" width="46" height="46"/>
    </g>

    <!-- yellow-1-2-1 -->
    <g transform="translate(228 170)" fill="#facc15">
      <rect class="c" x="0" y="0" width="46" height="46"/>
      <rect class="c" x="46" y="0" width="46" height="46"/>
      <rect class="c" x="92" y="0" width="46" height="46"/>
      <rect class="c" x="46" y="46" width="46" height="46"/>
    </g>

    <!-- blue-3-1 -->
    <g transform="translate(14 270)" fill="#3b82f6">
      <rect class="c" x="0" y="0" width="46" height="46"/>
      <rect class="c" x="0" y="46" width="46" height="46"/>
      <rect class="c" x="0" y="92" width="46" height="46"/>
      <rect class="c" x="46" y="92" width="46" height="46"/>
    </g>

    <!-- orange-2-1-2 -->
    <g transform="translate(132 276)" fill="#f97316">
      <rect class="c" x="0" y="0" width="46" height="46"/>
      <rect class="c" x="0" y="46" width="46" height="46"/>
      <rect class="c" x="46" y="0" width="46" height="46"/>
      <rect class="c" x="92" y="0" width="46" height="46"/>
      <rect class="c" x="92" y="46" width="46" height="46"/>
    </g>

    <!-- white-1-1 -->
    <g transform="translate(314 304)" fill="#f7fbff">
      <rect class="c" x="0" y="0" width="44" height="44"/>
      <rect class="c" x="44" y="0" width="44" height="44"/>
    </g>
  </g>
</svg>
