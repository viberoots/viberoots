version: 1

_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"
  keep_trailing_newline: true

_exclude:
  - meta.json

# Variables populated by scaf
name: ""
language: "node"
template: "webapp"

# Derived defaults for Node webapp
importer: "apps/{{ name }}"
lockfilePath: "apps/{{ name }}/pnpm-lock.yaml"
pkgScope: "@apps"
includeNodeTests: false

_tasks:
  - mkdir -p src
  - mkdir -p test
_templates_suffix: ".jinja"
_answers_file: ".copier-answers.yml"
