version: 1

_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"
  keep_trailing_newline: true

_exclude:
  - meta.json

name: ""
language: "node"
template: "lib"

importer: "libs/{{ name }}"
lockfilePath: "libs/{{ name }}/pnpm-lock.yaml"
pkgScope: "@libs"
includeNodeTests: false

_tasks:
  - mkdir -p libs/{{ name }}/src
  - mkdir -p libs/{{ name }}/test
