# Minimal copier template for go/cli
version: 1

_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"
  keep_trailing_newline: true

_exclude:
  - meta.json
  - help.md

# scaf supplies values via --data-file
name: ""
language: "go"
template: "cli"

# Required variables for Phase 1
module: "github.com/example/{{ name }}"
description: "{{ name }} CLI"
go_min: "1.22"
license: "MIT"
enable_ci: false

_tasks:
  - mkdir -p apps/{{ name }}/cmd/{{ name }}
  - touch apps/{{ name }}/go.mod
  - touch apps/{{ name }}/gomod2nix.toml
  - touch apps/{{ name }}/TARGETS
  - touch apps/{{ name }}/cmd/{{ name }}/main.go

_templates:
  apps/{{ name }}/go.mod: |
    module {{ module }}

    go {{ go_min }}

  apps/{{ name }}/gomod2nix.toml: |
    # Generated by gomod2nix (install-deps). Placeholder.

  apps/{{ name }}/TARGETS: |
    load("//go:defs.bzl", "nix_go_binary")

    nix_go_binary(
        name = "{{ name }}",
        srcs = glob(["cmd/{{ name }}/**/*.go"]),
        labels = ["lang:go", "kind:bin"],
    )

  apps/{{ name }}/cmd/{{ name }}/main.go: |
    package main

    import (
      "fmt"
    )

    func main() {
      fmt.Println("ok")
    }
