# Minimal copier template for go/lib
version: 1

_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"
  keep_trailing_newline: true

# Do not copy template metadata into scaffolds
_exclude:
  - meta.json
  - help.md

# Top-level variable defaults; scaf supplies values via --data-file
name: ""
language: "go"
template: "lib"

# Required variables for Phase 1
module: "github.com/example/{{ name }}"
description: "{{ name }} library"
go_min: "1.22"
license: "MIT"
enable_ci: false

_tasks:
  - mkdir -p libs/{{ name }}/pkg/{{ name }}
  - touch libs/{{ name }}/go.mod
  - touch libs/{{ name }}/gomod2nix.toml
  - touch libs/{{ name }}/TARGETS
  - touch libs/{{ name }}/pkg/{{ name }}/{{ name }}.go
  - touch libs/{{ name }}/pkg/{{ name }}/{{ name }}_test.go

_templates:
  libs/{{ name }}/go.mod: |
    module {{ module }}

    go {{ go_min }}

  libs/{{ name }}/gomod2nix.toml: |
    # Generated by gomod2nix (install-deps). Placeholder.

  libs/{{ name }}/TARGETS: |
    load("//go:defs.bzl", "nix_go_library", "nix_go_test")

    nix_go_library(
        name = "{{ name }}",
        srcs = glob(["pkg/**/*.go"], exclude=["**/*_test.go"]),
        labels = ["lang:go", "kind:lib"],
    )

    nix_go_test(
        name = "{{ name }}_test",
        srcs = glob(["pkg/**/*_test.go"]),
        deps = [":{{ name }}"],
        labels = ["lang:go", "kind:test"],
    )

  libs/{{ name }}/pkg/{{ name }}/{{ name }}.go: |
    package {{ name | replace("-", "") }}

    func Hello() string {
      return "hello"
    }

  libs/{{ name }}/pkg/{{ name }}/{{ name }}_test.go: |
    package {{ name | replace("-", "") }}

    import "testing"

    func TestHello(t *testing.T) {
      if Hello() == "" {
        t.Fatal("expected non-empty greeting")
      }
    }
